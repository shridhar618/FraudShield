services:
  - type: web
    name: fraudshield-pro
    runtime: python
    plan: free
    buildCommand: npm ci && npm run build && pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: FRAUDSHIELD_DEBUG
        value: "0"
